version: "3.8"
services:
  vulnlab:
    build:
      context: .
    image: vulnlab-fastapi:latest
    container_name: vulnlab
    environment:
      - ROUTES_FILE=/app/app/routes.json
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app:rw
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

